services:

  backend:

    build:
      context: .
      dockerfile: backend/Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload


  frontend:

    build:
      context: .
      dockerfile: frontend/Dockerfile

    ports:
      - "8501:8501"

    depends_on:
      - backend